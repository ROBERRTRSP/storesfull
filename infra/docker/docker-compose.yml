services:
  db:
    image: postgres:16
    container_name: ruta_postgres
    environment:
      POSTGRES_USER: ruta
      POSTGRES_PASSWORD: ruta
      POSTGRES_DB: ruta_dev
    ports:
      # Host 5433 evita choque con Postgres.app (suele usar 5432 en el Mac).
      - "5433:5432"
    volumes:
      - ruta_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ruta -d ruta_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

  adminer:
    image: adminer:4
    container_name: ruta_adminer
    ports:
      # 8080 suele estar ocupado en el Mac; Adminer en http://localhost:8081
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  ruta_pgdata:

